<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Seats Alert{% endblock %}</title>
  <style>
    :root {
      --bg: #0f1114;
      --surface: #181b20;
      --border: #2a2f36;
      --text: #e8eaed;
      --muted: #9aa0a6;
      --accent: #7c9cff;
      --danger: #f87171;
      --ok: #4ade80;
      --warn: #fbbf24;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
    header {
      padding: 1rem 1.5rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      background: var(--surface);
    }
    header h1 { margin: 0; font-size: 1.15rem; font-weight: 600; }
    main { max-width: 960px; margin: 0 auto; padding: 1.5rem; }
    .flash { padding: 0.65rem 1rem; border-radius: 8px; margin-bottom: 1rem; border: 1px solid var(--border); }
    .flash.ok { border-color: #166534; background: #14532d33; color: var(--ok); }
    .flash.error { border-color: #991b1b; background: #7f1d1d33; color: var(--danger); }
    .btn {
      display: inline-block;
      padding: 0.45rem 0.85rem;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      font-size: 0.9rem;
      cursor: pointer;
    }
    .btn:hover { border-color: var(--muted); }
    .btn.primary { background: var(--accent); color: #0b1020; border-color: transparent; font-weight: 600; }
    .btn.danger { border-color: #991b1b; color: var(--danger); }
    .btn.small { padding: 0.25rem 0.55rem; font-size: 0.8rem; }
    label { display: block; font-size: 0.85rem; color: var(--muted); margin-bottom: 0.25rem; }
    input[type="text"], input[type="number"], select, textarea {
      width: 100%;
      padding: 0.5rem 0.65rem;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: #0b0d10;
      color: var(--text);
    }
    textarea { min-height: 4rem; resize: vertical; }
    .row { display: grid; gap: 1rem; margin-bottom: 1rem; }
    @media (min-width: 640px) {
      .row.two { grid-template-columns: 1fr 1fr; }
    }
    .checkboxes {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 0.35rem 0.75rem;
      max-height: 220px;
      overflow: auto;
      padding: 0.5rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: #0b0d10;
    }
    .check-item { display: flex; align-items: center; gap: 0.35rem; font-size: 0.85rem; }
    .check-item input { width: auto; }
    .toolbar { display: flex; flex-wrap: wrap; gap: 0.5rem; align-items: center; }
    header .nav-link {
      font-size: 0.9rem;
      color: var(--muted);
      padding: 0.35rem 0.5rem;
      border-radius: 6px;
    }
    header .nav-link:hover { color: var(--text); background: #0b0d10; text-decoration: none; }
  </style>
  {% block head %}{% endblock %}
</head>
<body>
  <header>
    <h1><a href="{{ url_for('index') }}" style="color:inherit;text-decoration:none;">Seats Alert</a></h1>
    <nav class="toolbar">
      <a class="nav-link" href="{{ url_for('index') }}">All alerts</a>
      <a class="btn primary" href="{{ url_for('alert_new') }}">New Alert</a>
    </nav>
  </header>
  <main>
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="flash {{ category }}">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}
    {% block body %}{% endblock %}
  </main>
</body>
</html>
